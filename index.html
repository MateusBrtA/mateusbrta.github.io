<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;color:#bcd}
canvas{display:block}
#bar{position:fixed;top:0;left:0;right:0;height:40px;background:rgba(0,4,14,.92);backdrop-filter:blur(5px);border-bottom:1px solid rgba(60,120,255,.1);display:flex;align-items:center;gap:7px;padding:0 12px;z-index:100;pointer-events:auto;overflow:hidden}
#bar h1{font-size:10px;letter-spacing:3px;color:#4af;font-weight:400;white-space:nowrap}
.dv{width:1px;height:16px;background:rgba(80,140,255,.1);flex-shrink:0}
.bg{display:flex;align-items:center;gap:4px}
.bl{font-size:8px;color:#345;letter-spacing:1px}
#spS{width:72px;accent-color:#3af;cursor:pointer}
#spD{font-size:9px;color:#3af;min-width:26px}
.tb{padding:3px 6px;background:rgba(40,90,200,.1);border:1px solid rgba(60,120,255,.18);color:#7af;border-radius:2px;font:8px 'Courier New';letter-spacing:.5px;cursor:pointer;white-space:nowrap;transition:all .1s;user-select:none;flex-shrink:0}
.tb:hover{background:rgba(60,120,255,.2)}
.tb.on{background:rgba(40,200,120,.12);border-color:rgba(60,220,140,.3);color:#5db}
.tb.wn{background:rgba(220,100,40,.1);border-color:rgba(255,140,60,.25);color:#fa8}
.tb.wn.on{background:rgba(220,60,40,.2);border-color:rgba(255,80,60,.3);color:#f88}
#lp{position:fixed;left:0;top:40px;bottom:28px;width:165px;background:rgba(0,4,14,.82);border-right:1px solid rgba(60,120,255,.07);overflow-y:auto;padding:7px 0;z-index:80}
#lp::-webkit-scrollbar{width:2px}#lp::-webkit-scrollbar-thumb{background:rgba(80,150,255,.14)}
.lt{font-size:7px;letter-spacing:2px;color:#234;padding:0 9px 4px;text-transform:uppercase}
.br{display:flex;align-items:center;gap:5px;padding:4px 9px;cursor:pointer;border-left:2px solid transparent;transition:all .07s}
.br:hover{background:rgba(80,150,255,.05);border-left-color:rgba(80,150,255,.22)}
.br.sl{background:rgba(80,150,255,.07);border-left-color:#4af}
.bd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.bi{flex:1;overflow:hidden}
.bn{font-size:8px;color:#9bc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bs{font-size:7px;color:#345}
.ac{font-size:7px;color:#234;padding:4px 9px}
#sp{position:fixed;right:0;top:40px;width:205px;background:rgba(0,4,14,.93);backdrop-filter:blur(6px);border-left:1px solid rgba(60,120,255,.1);padding:11px;z-index:80;display:none}

#sp .cx:hover{background:rgba(255,60,60,.2)}
#sN{font-size:11px;color:#6ef;letter-spacing:1px;margin-bottom:8px;padding-right:20px}
.sr{display:flex;justify-content:space-between;margin-bottom:3px;font-size:8px}.sk{color:#345}.sv{color:#9bc}
.sep{height:1px;background:rgba(60,120,255,.07);margin:6px 0}
.fl{font-size:7px;color:#345;letter-spacing:1px;display:block;margin-bottom:2px}
.fi{width:100%;padding:4px 6px;margin-bottom:5px;background:rgba(0,10,30,.85);border:1px solid rgba(60,120,255,.13);color:#9bc;border-radius:2px;font:8px 'Courier New'}
.fi:focus{outline:none;border-color:rgba(60,150,255,.36)}
.pb{display:flex;gap:4px;margin-top:2px}.pb .tb{flex:1;text-align:center}
.dbt{color:#f77!important;border-color:rgba(255,70,70,.18)!important}
.vr{display:flex;gap:3px;margin-bottom:3px}
.vr input{flex:1;padding:3px 4px;background:rgba(0,14,7,.85);border:1px solid rgba(40,180,100,.15);color:#5db;border-radius:2px;font:8px 'Courier New'}
.av{width:100%;margin-top:2px}
/* transform select */
#tfPanel{margin-top:5px}
#tfPanel select{width:100%;padding:4px 6px;margin-bottom:5px;background:rgba(0,10,30,.9);border:1px solid rgba(60,120,255,.14);color:#9bc;border-radius:2px;font:8px 'Courier New'}
/* spawn modal */
#sm{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,5,18,.97);border:1px solid rgba(60,150,255,.2);border-radius:4px;padding:16px;z-index:200;display:none;min-width:258px;backdrop-filter:blur(10px)}
#sm h3{font-size:10px;color:#5af;letter-spacing:2px;margin-bottom:10px;font-weight:400}
#sm label{font-size:7px;color:#345;letter-spacing:1px;display:block;margin-bottom:2px}
#sm input,#sm select{width:100%;padding:5px 6px;margin-bottom:6px;background:rgba(0,10,30,.9);border:1px solid rgba(60,120,255,.15);color:#9bc;border-radius:2px;font:8px 'Courier New'}
#sm select option{background:#000d20}
.mb{display:flex;gap:6px;margin-top:3px}.mb .tb{flex:1;text-align:center;padding:6px}
#ov{position:fixed;inset:0;z-index:199;display:none}

#cursorDot{position:fixed;width:14px;height:14px;border:1px solid rgba(60,220,255,.65);border-radius:50%;pointer-events:none;display:none;z-index:160;transform:translate(-50%,-50%)}
#cursorDot::after{content:'';position:absolute;top:50%;left:50%;width:3px;height:3px;background:rgba(60,220,255,.9);border-radius:50%;transform:translate(-50%,-50%)}
#sb{position:fixed;bottom:0;left:0;right:0;height:28px;background:rgba(0,4,14,.82);border-top:1px solid rgba(60,120,255,.07);display:flex;align-items:center;gap:18px;padding:0 12px;z-index:80;pointer-events:none}
.st{display:flex;gap:4px;align-items:baseline}
.sl2{font-size:7px;color:#234;letter-spacing:1.5px;text-transform:uppercase}
.sv2{font-size:9px;color:#4af}
#hnt{position:fixed;bottom:35px;right:11px;font-size:7px;color:#234;line-height:1.9;text-align:right;pointer-events:none;z-index:70}
#hnt b{color:#345}
#xh{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:140}
#xh::before,#xh::after{content:'';position:absolute;background:rgba(80,200,255,.4)}
#xh::before{width:12px;height:1px;top:0;left:-6px}#xh::after{width:1px;height:12px;top:-6px;left:0}
#tp{position:fixed;pointer-events:none;display:none;background:rgba(0,6,20,.94);border:1px solid rgba(60,120,255,.17);padding:3px 7px;border-radius:2px;font-size:7px;color:#7af;white-space:nowrap;z-index:150}
</style>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ══════════════════════════════════════════════════════════
//  CONSTANTS
//  AU = 6400 visual units/AU, BOOST = 8 (Earth radius = 8vu)
//  G calibrated: Earth period visually sensible at tMult=3 default
// ══════════════════════════════════════════════════════════
const AU    = 6400;
const BOOST = 8;
const G     = 1.8e-3;   // calibrated for AU=6400
const SOFT2 = 0.5;
const M_SUN = 1989000;

// Hill sphere fraction for moon placement
function hillR(par_au, par_m) {
  return par_au * AU * Math.pow(par_m / (3 * M_SUN), 1/3);
}

// ══════════════════════════════════════════════════════════
//  RENDERER / SCENE
// ══════════════════════════════════════════════════════════
const ren = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
ren.setPixelRatio(Math.min(devicePixelRatio, 1.5));
ren.setSize(innerWidth, innerHeight);
ren.toneMapping = THREE.ACESFilmicToneMapping;
ren.toneMappingExposure = 1.0;
document.body.appendChild(ren.domElement);

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 1, 2000000);
cam.position.set(0, 15000, 30000);

const orbit = new OrbitControls(cam, ren.domElement);
orbit.enableDamping = true; orbit.dampingFactor = 0.06;
orbit.maxDistance = 600000; orbit.minDistance = 2;

scene.add(new THREE.AmbientLight(0x060810, 1));
const sunPt = new THREE.PointLight(0xfff8e0, 0, 0, 1.3);
scene.add(sunPt);

// ══════════════════════════════════════════════════════════
//  BACKGROUND STARS + MILKY WAY BAND
// ══════════════════════════════════════════════════════════
{
  const n=14000, p=new Float32Array(n*3), c=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const band = Math.random()<0.35; // 35% in milky way band
    let t,ph;
    if(band){ t=Math.random()*6.28; ph=Math.acos(2*Math.random()-1)*0.18+Math.PI/2-0.1; }
    else    { t=Math.random()*6.28; ph=Math.acos(2*Math.random()-1); }
    const r=200000+Math.random()*600000;
    p[i*3]=r*Math.sin(ph)*Math.cos(t); p[i*3+1]=r*Math.sin(ph)*Math.sin(t); p[i*3+2]=r*Math.cos(ph);
    const bri=Math.random();
    if(band){ c[i*3]=.9+bri*.1; c[i*3+1]=.85+bri*.1; c[i*3+2]=.7+bri*.2; }
    else { c[i*3]=.7+bri*.3; c[i*3+1]=.7+(1-bri)*.2; c[i*3+2]=.96; }
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(p,3));
  g.setAttribute('color',new THREE.BufferAttribute(c,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({size:2,vertexColors:true,sizeAttenuation:true})));
}

// ══════════════════════════════════════════════════════════
//  TEXTURES
// ══════════════════════════════════════════════════════════
const _tc={};
function mkTex(type,hex,sz=256){
  const key=`${type}_${hex}`; if(_tc[key]) return _tc[key];
  const cv=document.createElement('canvas');cv.width=cv.height=sz;
  const ctx=cv.getContext('2d');
  const R=(hex>>16)&255,G2=(hex>>8)&255,B=hex&255;
  const rn=(a,z)=>a+Math.random()*(z-a);
  ctx.fillStyle=`rgb(${R},${G2},${B})`;ctx.fillRect(0,0,sz,sz);
  if(type==='sun'||type==='giant'){
    for(let i=0;i<280;i++){const x=rn(0,sz),y=rn(0,sz),s=rn(4,sz*.12),br=rn(.78,1.22);ctx.beginPath();ctx.arc(x,y,s,0,6.28);ctx.fillStyle=`rgba(${Math.min(255,R*br)},${Math.min(255,G2*br*.5)},4,${rn(.02,.1)})`;ctx.fill();}
    for(let i=0;i<14;i++){ctx.beginPath();ctx.arc(rn(0,sz),rn(0,sz),rn(3,sz*.06),0,6.28);ctx.fillStyle='rgba(0,0,0,.24)';ctx.fill();}
  } else if(type==='earth'){
    ctx.fillStyle='#1144aa';ctx.fillRect(0,0,sz,sz);ctx.fillStyle='#226622';
    [[.27,.16,.38,.3],[.12,.37,.33,.25],[.55,.1,.3,.4],[.67,.45,.27,.34]].forEach(([a,b,c2,d])=>{ctx.save();ctx.translate((a+c2/2)*sz,(b+d/2)*sz);ctx.rotate(rn(0,3.14));ctx.beginPath();ctx.ellipse(0,0,c2/2*sz,d/2*sz,0,0,6.28);ctx.fill();ctx.restore();});
    for(let i=0;i<14;i++){ctx.fillStyle=`rgba(255,255,255,${rn(.14,.42)})`;ctx.fillRect(rn(0,sz),rn(0,sz),rn(30,120),rn(10,34));}
    ctx.fillStyle='rgba(220,238,255,.88)';ctx.fillRect(0,0,sz,18);ctx.fillRect(0,sz-18,sz,18);
  } else if(type==='gas'){
    for(let y=0;y<sz;y+=rn(10,36)){const h=rn(6,28);ctx.fillStyle=`rgba(${Math.max(0,Math.min(255,R+rn(-45,45)))},${Math.max(0,Math.min(255,G2+rn(-22,22)))},${Math.max(0,Math.min(255,B+rn(-32,32)))},0.64)`;ctx.fillRect(0,y,sz,h);}
    ctx.fillStyle=`rgba(${Math.max(0,R-40)},${Math.max(0,G2-50)},${Math.max(0,B-20)},.5)`;ctx.beginPath();ctx.ellipse(sz*.38,sz*.5,sz*.09,sz*.06,.2,0,6.28);ctx.fill();
  } else if(type==='ice'){
    ctx.fillStyle=`rgb(${Math.min(255,R+14)},${Math.min(255,G2+18)},${Math.min(255,B+24)})`;ctx.fillRect(0,0,sz,sz);
    for(let i=0;i<44;i++){ctx.strokeStyle=`rgba(${Math.min(255,R+75)},${Math.min(255,G2+85)},${Math.min(255,B+95)},${rn(.05,.25)})`;ctx.lineWidth=rn(1,4);const x=rn(0,sz);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+rn(-40,40),sz);ctx.stroke();}
  } else if(type==='whitedwarf'){
    const gd=ctx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);gd.addColorStop(0,'#fff');gd.addColorStop(.35,`rgba(${R},${G2},${B},1)`);gd.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gd;ctx.fillRect(0,0,sz,sz);
  } else if(type==='neutron'){
    const gd=ctx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);gd.addColorStop(0,'#fff');gd.addColorStop(.2,'rgba(120,200,255,1)');gd.addColorStop(.6,`rgba(${R},${G2},${B},.6)`);gd.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gd;ctx.fillRect(0,0,sz,sz);
  } else if(type==='blackhole'){
    const gd=ctx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);gd.addColorStop(0,'#000');gd.addColorStop(.28,'rgba(0,0,0,.97)');gd.addColorStop(.7,`rgba(${R},${G2},${B},.2)`);gd.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gd;ctx.fillRect(0,0,sz,sz);
  } else if(type==='browndwarf'){
    for(let y=0;y<sz;y+=rn(8,28)){const h=rn(5,22);ctx.fillStyle=`rgba(${Math.max(0,Math.min(255,R+rn(-30,30)))},${Math.max(0,Math.min(255,G2+rn(-15,15)))},${Math.max(0,Math.min(255,B+rn(-20,20)))},0.7)`;ctx.fillRect(0,y,sz,h);}
  } else {
    ctx.fillStyle=`rgb(${Math.max(0,R-14)},${Math.max(0,G2-14)},${Math.max(0,B-14)})`;ctx.fillRect(0,0,sz,sz);
    for(let i=0;i<50;i++){const x=rn(0,sz),y=rn(0,sz),rad=rn(3,22);ctx.strokeStyle=`rgba(${R+22},${G2+22},${B+22},.27)`;ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(x,y,rad,0,6.28);ctx.stroke();ctx.fillStyle=`rgba(${R-22},${G2-22},${B-22},.27)`;ctx.beginPath();ctx.arc(x,y,rad*.78,0,6.28);ctx.fill();}
  }
  const tex=new THREE.CanvasTexture(cv);tex.generateMipmaps=false;tex.minFilter=THREE.LinearFilter;
  _tc[key]=tex;return tex;
}

function mkRingTex(col){
  const cv=document.createElement('canvas');cv.width=512;cv.height=4;
  const ctx=cv.getContext('2d'),R=(col>>16)&255,G2=(col>>8)&255,B=col&255;
  const gd=ctx.createLinearGradient(0,0,512,0);
  gd.addColorStop(0,'rgba(0,0,0,0)');gd.addColorStop(.06,`rgba(${R},${G2},${B},.55)`);
  gd.addColorStop(.32,'rgba(252,212,152,.38)');gd.addColorStop(.62,`rgba(${R},${G2},${B},.42)`);
  gd.addColorStop(.9,`rgba(${Math.min(255,R+30)},${Math.min(255,G2+26)},${Math.min(255,B+12)},.2)`);
  gd.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gd;ctx.fillRect(0,0,512,4);
  return new THREE.CanvasTexture(cv);
}
function mkRing(inR,ouR,col){
  const geo=new THREE.RingGeometry(inR,ouR,128);
  return new THREE.Mesh(geo,new THREE.MeshBasicMaterial({map:mkRingTex(col),transparent:true,side:THREE.DoubleSide,depthWrite:false}));
}
function addGlow(mesh,rad,col,layers=[[1.28,.28],[1.72,.13],[2.35,.055]]){
  for(const[s,o]of layers) mesh.add(new THREE.Mesh(new THREE.SphereGeometry(rad*s,18,18),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:o,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide})));
}

//  NEBULA (volumetric sprite cloud)

function createNebula(pos, radius, col1, col2) {
  const grp = new THREE.Group();
  grp.position.copy(pos);
  // Multiple overlapping transparent sprites
  for(let i=0;i<18;i++){
    const cv=document.createElement('canvas');cv.width=cv.height=256;
    const ctx=cv.getContext('2d');
    const r1=(col1>>16)&255,g1=(col1>>8)&255,b1=col1&255;
    const r2=(col2>>16)&255,g2=(col2>>8)&255,b2=col2&255;
    const gd=ctx.createRadialGradient(128,128,0,128,128,128);
    const mx=Math.random(); // mix factor
    const rr=Math.round(r1*mx+r2*(1-mx)),gg=Math.round(g1*mx+g2*(1-mx)),bb=Math.round(b1*mx+b2*(1-mx));
    gd.addColorStop(0,`rgba(${rr},${gg},${bb},${.12+Math.random()*.15})`);
    gd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gd;ctx.fillRect(0,0,256,256);
    const tex=new THREE.CanvasTexture(cv);
    tex.generateMipmaps=false;tex.minFilter=THREE.LinearFilter;
    const sz=radius*(0.5+Math.random()*0.8);
    const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
    spr.scale.set(sz,sz,1);
    const ang=Math.random()*6.28,dist=Math.random()*radius*.5;
    spr.position.set(Math.cos(ang)*dist,(Math.random()-.5)*dist*.5,Math.sin(ang)*dist);
    grp.add(spr);
  }
  scene.add(grp);
  return grp;
}

const _exps=[];
function explode(pos,speed,col){
  const n=40,arr=new Float32Array(n*3),vels=[];
  for(let i=0;i<n;i++){arr[i*3]=pos.x;arr[i*3+1]=pos.y;arr[i*3+2]=pos.z;vels.push(new THREE.Vector3().randomDirection().multiplyScalar(speed*(.3+Math.random()*.7)));}
  const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(arr.slice(),3));
  const mat=new THREE.PointsMaterial({color:new THREE.Color(col),size:Math.max(2,speed*.3),transparent:true,opacity:.85,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true});
  const pts=new THREE.Points(geo,mat);scene.add(pts);let life=0;
  _exps.push(dt=>{life+=dt;const a=geo.attributes.position.array;for(let i=0;i<n;i++){a[i*3]+=vels[i].x*dt;a[i*3+1]+=vels[i].y*dt;a[i*3+2]+=vels[i].z*dt;}geo.attributes.position.needsUpdate=true;mat.opacity=Math.max(0,.85-life*2.2);if(life>.4){scene.remove(pts);geo.dispose();mat.dispose();return true;}return false;});
}

function equilTempC(sunMassRel,distVis){
  const dAU=Math.max(.01,distVis/AU);

let _bid=0;
class Body {
  constructor(o){
    this.id=_bid++;
    this.name=o.n||'Body';
    this.type=o.ty||'rocky';
    this.mass=o.m||1;
    this.radius=o.r||BOOST;
    this.temperature=o.t!==undefined?o.t:0;
    this.color=o.c||0xffffff;
    this.isStar=['sun','star','giant','whitedwarf','neutron','browndwarf'].includes(this.type);
    this.isAst=['asteroid','comet'].includes(this.type);
    this.isBH=this.type==='blackhole';
    this.isNebula=this.type==='nebula';
    this.removed=false;
    this.pos=new THREE.Vector3(o.x||0,o.y||0,o.z||0);
    this.vel=new THREE.Vector3(o.vx||0,o.vy||0,o.vz||0);
    this.acc=new THREE.Vector3();
    this._frame=0;
    this._meshObjs=[];
    this._buildMesh(o);
    this._buildTrail();
    this.labelSpr=null;
  }

  _buildMesh(o){
    // Minimum visual size
    const visR=Math.max(this.isAst?.3:.5*BOOST, this.radius);
    this._visR=visR;

    if(this.isNebula){
      this._nebulaGrp=createNebula(this.pos, visR*3, this.color, o.c2||0x8833ff);
      _nebulae.push(this._nebulaGrp);
      // Nebulas have no physics mesh — use invisible sphere for raycasting
      this.mesh=new THREE.Mesh(new THREE.SphereGeometry(visR,8,8),new THREE.MeshBasicMaterial({transparent:true,opacity:0}));
      this.mesh.userData.body=this; this.mesh.position.copy(this.pos); scene.add(this.mesh);
      return;
    }

    const seg=this.isAst?4:32;
    const geo=this.isAst?new THREE.IcosahedronGeometry(visR,1):new THREE.SphereGeometry(visR,seg,seg);
    let mat;
    if(this.isStar) mat=new THREE.MeshBasicMaterial({map:mkTex(o.tx||'sun',this.color),color:this.color});
    else if(this.isBH) mat=new THREE.MeshBasicMaterial({color:0});
    else mat=new THREE.MeshStandardMaterial({map:mkTex(o.tx||'rocky',this.color),roughness:o.tx==='ice'?.2:o.tx==='gas'?.55:.82,metalness:.03,emissive:new THREE.Color(0),emissiveIntensity:0});
    this.mesh=new THREE.Mesh(geo,mat);
    this.mesh.userData.body=this;
    this.mesh.position.copy(this.pos);
    if(o.tilt) this.mesh.rotation.z=o.tilt;
    scene.add(this.mesh);

    if(o.rings){
      const rm=mkRing(visR*SAT_RI,visR*SAT_RO,o.rc||0xc5ab6e);
      rm.rotation.x=Math.PI*.42;this.mesh.add(rm);
    }
    if(this.isStar){
      const gc=this.type==='whitedwarf'?0xaaccff:this.type==='neutron'?0x88ddff:this.type==='browndwarf'?0xff6600:this.type==='giant'?0xff6622:this.color;
      addGlow(this.mesh,visR,gc);
      if(this.type==='whitedwarf') addGlow(this.mesh,visR,0xaaddff,[[4,.06],[7,.03]]);
      if(this.type==='neutron'){
        const jm=new THREE.MeshBasicMaterial({color:0x88ddff,transparent:true,opacity:.5,blending:THREE.AdditiveBlending,depthWrite:false});
        const jg=new THREE.CylinderGeometry(.1,visR*.4,visR*10,8);
        const j1=new THREE.Mesh(jg,jm);j1.position.y=visR*5;this.mesh.add(j1);
        const j2=new THREE.Mesh(jg,jm);j2.position.y=-visR*5;this.mesh.add(j2);
      }
      this.light=new THREE.PointLight(0xfff8e0,0,0,1.3);
      scene.add(this.light);this._syncLight();
    }
    if(this.isBH){
      const rm=mkRing(visR*1.5,visR*4.2,0xff8800);
      rm.rotation.x=Math.PI*.18;rm.material=rm.material.clone();rm.material.blending=THREE.AdditiveBlending;this.mesh.add(rm);
      this.mesh.add(new THREE.Mesh(new THREE.SphereGeometry(visR*3,18,18),new THREE.MeshBasicMaterial({color:0x220044,transparent:true,opacity:.18,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide})));
    }
  }

  _buildTrail(){
    const TMAX=this.isAst||this.isNebula?0:280;
    if(!TMAX){this.trail=null;this._TMAX=0;this._tLen=0;this._tHead=0;return;}
    const tgeo=new THREE.BufferGeometry();
    tgeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(TMAX*3),3));
    tgeo.setDrawRange(0,0);
    this.trail=new THREE.Line(tgeo,new THREE.LineBasicMaterial({color:new THREE.Color(this.color),transparent:true,opacity:.25,depthWrite:false}));
    this.trail.frustumCulled=false;scene.add(this.trail);
    this._TMAX=TMAX;this._tLen=0;this._tHead=0;
  }

  _syncLight(){
    if(!this.light)return;
    let f=Math.sqrt(Math.max(.001,this.mass/M_SUN));
    if(this.type==='whitedwarf') f*=.2;
    if(this.type==='neutron')    f*=.05;
    if(this.type==='browndwarf') f*=.01;
    this.light.intensity=f*6000;
    this.light.distance=this._visR*500;
    this.light.position.copy(this.pos);
  }

  _buildLabel(){
    if(this.labelSpr)return;
    const cv=document.createElement('canvas');cv.width=256;cv.height=40;
    const ctx=cv.getContext('2d');ctx.font='16px Courier New';ctx.fillStyle='#aaccff';ctx.textAlign='center';ctx.fillText(this.name,128,28);
    const mat=new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,opacity:.75,depthWrite:false});
    this.labelSpr=new THREE.Sprite(mat);this.labelSpr.scale.set(800,200,1);scene.add(this.labelSpr);
  }

  updTrail(){
    if(!showTr||!this.trail)return;
    const buf=this.trail.geometry.attributes.position.array,i=this._tHead*3;
    buf[i]=this.pos.x;buf[i+1]=this.pos.y;buf[i+2]=this.pos.z;
    this._tHead=(this._tHead+1)%this._TMAX;
    if(this._tLen<this._TMAX)this._tLen++;
    this.trail.geometry.attributes.position.needsUpdate=true;
    this.trail.geometry.setDrawRange(0,this._tLen);
  }

  updLabel(){
    if(!showLb||this.isAst){if(this.labelSpr)this.labelSpr.visible=false;return;}
    if(!this.labelSpr)this._buildLabel();
    this.labelSpr.visible=true;
    this.labelSpr.position.set(this.pos.x,this.pos.y+this._visR*2.2,this.pos.z);
  }

  updAppearance(){
    if(this.isStar||this.isBH||this.isNebula)return;
    const mat=this.mesh.material;if(!mat.emissive)return;
    const t=this.temperature;
    if(t>4000){mat.emissive.setHex(0xffffff);mat.emissiveIntensity=Math.min(4,(t-4000)/3000*4);if(!this._hl){this._hl=new THREE.PointLight(0xffffff,0,0,2);scene.add(this._hl);}this._hl.intensity=Math.min(2000,(t-4000)/2000*900);this._hl.distance=this._visR*15;this._hl.color.setHSL(.08+Math.min(.06,(t-4000)/30000),1,.7);this._hl.position.copy(this.pos);}
    else if(t>1500){mat.emissive.setHex(0xff5500);mat.emissiveIntensity=(t-1500)/2500*1.8;if(this._hl)this._hl.intensity=0;}
    else if(t>500){mat.emissive.setHex(0xff2200);mat.emissiveIntensity=(t-500)/1000*.7;if(this._hl)this._hl.intensity=0;}
    else if(t>100){mat.emissive.setHex(0xff6600);mat.emissiveIntensity=(t-100)/400*.25;if(this._hl)this._hl.intensity=0;}
    else{mat.emissive.setHex(0);mat.emissiveIntensity=0;if(this._hl)this._hl.intensity=0;}
  }

  updTemp(sun,dtR){
    if(!sun||this===sun||this.isStar||this.isNebula)return;
    const d=this.pos.distanceTo(sun.pos);
    this.temperature+=(equilTempC(sun.mass/M_SUN,d)-this.temperature)*(1-Math.exp(-dtR/600));
  }

  sync(){
    this.mesh.position.copy(this.pos);
    if(!this.isNebula){
      this.mesh.rotation.y+=this.isStar?.0003:.0014;
      if(this._hl)this._hl.position.copy(this.pos);
      if(this.light)this._syncLight();
    }
    if(this._nebulaGrp)this._nebulaGrp.position.copy(this.pos);
    this._frame++;
  }

  rebuildGeo(){
    if(this.isNebula)return;
    this.mesh.geometry.dispose();
    const vR=Math.max(this.isAst?.3:.5*BOOST,this.radius);this._visR=vR;
    this.mesh.geometry=this.isAst?new THREE.IcosahedronGeometry(vR,1):new THREE.SphereGeometry(vR,32,32);
  }

  remove(){
    this.removed=true;
    scene.remove(this.mesh);
    if(this.trail)scene.remove(this.trail);
    if(this.labelSpr)scene.remove(this.labelSpr);
    if(this.light)scene.remove(this.light);
    if(this._hl)scene.remove(this._hl);
    if(this._nebulaGrp){scene.remove(this._nebulaGrp);const idx=_nebulae.indexOf(this._nebulaGrp);if(idx>=0)_nebulae.splice(idx,1);}
    this.mesh.geometry.dispose();[this.mesh.material].flat().forEach(m=>m.dispose());
    if(this.trail)this.trail.geometry.dispose();
  }

  // ── TRANSFORM to different stellar type ──
  transformTo(newType){
    const configs={
      giant:     {ty:'giant',     r:this.radius*15, m:this.mass*.8,  c:0xff6622,t:3500, tx:'giant'},
      whitedwarf:{ty:'whitedwarf',r:BOOST*.9,        m:this.mass*.5,  c:0xaaccff,t:25000,tx:'whitedwarf'},
      browndwarf:{ty:'browndwarf',r:this.radius*1.5, m:this.mass*.08, c:0xaa5533,t:1800, tx:'browndwarf'},
      neutron:   {ty:'neutron',   r:BOOST*.07,       m:this.mass*.4,  c:0x88ddff,t:600000,tx:'neutron'},
      blackhole: {ty:'blackhole', r:this.radius*.3,  m:this.mass*.85, c:0x220033,t:-270, tx:'blackhole'},
    };
    const cfg=configs[newType]; if(!cfg) return;
    const pos=this.pos.clone(), vel=this.vel.clone();
    // Explode first
    explode(pos,this._visR*2,this.color);
    this.remove();
    const idx=bodies.indexOf(this); if(idx>=0) bodies.splice(idx,1);
    const nb=new Body({...cfg,n:this.name+' ('+cfg.ty+')',x:pos.x,y:pos.y,z:pos.z,vx:vel.x,vy:vel.y,vz:vel.z});
    nb.vel.copy(vel);
    bodies.push(nb);_listDirty=true;
    return nb;
  }
}

// ══════════════════════════════════════════════════════════
//  RING PARTICLE SYSTEM (Saturn / Uranus)
//  Uses a dedicated InstancedMesh for performance
// ══════════════════════════════════════════════════════════
class RingSystem {
  constructor(parent, count, innerFrac, outerFrac, col){
    this.parent=parent;
    this.count=count;
    this.particles=[];
    const geo=new THREE.IcosahedronGeometry(1,0);
    const mat=new THREE.MeshBasicMaterial({color:new THREE.Color(col)});

    // Pre-compute orbital parameters
    const pR=parent._visR;
    for(let i=0;i<count;i++){
      const rFrac=innerFrac+Math.random()*(outerFrac-innerFrac);
      const r=rFrac*pR;
      const ang=Math.random()*Math.PI*2;
      const spread=(Math.random()-.5)*pR*.04; // thin plane
      const pSize=.8+Math.random()*2.5; // varied sizes
      // Each particle: angle, radius, local y offset, size
      this.particles.push({ang, r, y:spread, size:pSize, dang:0});
    }

    // Instanced mesh
    this.im=new THREE.InstancedMesh(geo,mat,count);
    this.im.frustumCulled=false;
    scene.add(this.im);
    this._mat=new THREE.Matrix4();
    this._dummy=new THREE.Object3D();
    this._update(0);
  }

  _update(dt){
    const par=this.parent;
    // Orbital speed: v = sqrt(G*M/r), ang_vel = v/r = sqrt(G*M/r^3)
    for(let i=0;i<this.count;i++){
      const p=this.particles[i];
      // Keplerian: omega = sqrt(G*M/r^3)
      const omega=Math.sqrt(G*par.mass/(p.r*p.r*p.r));
      p.ang+=omega*dt;
      // Position relative to parent (in parent's local plane)
      const wx=par.pos.x+Math.cos(p.ang)*p.r;
      const wy=par.pos.y+p.y;
      const wz=par.pos.z+Math.sin(p.ang)*p.r;
      this._dummy.position.set(wx,wy,wz);
      this._dummy.scale.setScalar(p.size);
      this._dummy.updateMatrix();
      this.im.setMatrixAt(i,this._dummy.matrix);
    }
    this.im.instanceMatrix.needsUpdate=true;
  }

  remove(){scene.remove(this.im);this.im.geometry.dispose();this._mat.dispose?.();}
}

// ══════════════════════════════════════════════════════════
function orbVel(pos,cPos,cMass){
  const r=pos.distanceTo(cPos);if(r<.001)return new THREE.Vector3();
  const v=Math.sqrt(G*cMass/r);
  const d=new THREE.Vector3().subVectors(pos,cPos).normalize();
  return new THREE.Vector3(-d.z,0,d.x).multiplyScalar(v);
}

let bodies=[], colCount=0, simTime=0;

function buildSolarSystem(){
  bodies.forEach(b=>b.remove());
  ringSystems.forEach(rs=>rs.remove());
  bodies=[];ringSystems.length=0;_bid=0;colCount=0;simTime=0;
  _nebulae.length=0;
  document.getElementById('stC').textContent='0';
  const pm={};

  for(const d of PLANETS){
    const ang=Math.random()*6.28,dist=d.au*AU;
    const b=new Body({n:d.n,ty:d.ty,m:d.m,r:d.r,c:d.c,t:d.t,tx:d.tx,rings:false,rc:d.rc,tilt:d.tilt,
      x:dist===0?0:dist*Math.cos(ang),z:dist===0?0:dist*Math.sin(ang)});
    bodies.push(b);pm[d.n]=b;
  }
  const sun=pm['Sol'];
  bodies.forEach(b=>{if(b!==sun)b.vel.copy(orbVel(b.pos,sun.pos,sun.mass));});

  // ── Moons using Hill sphere fractions ──
  for(const md of MOONS){
    const par=pm[md.par];if(!par)continue;
    const ang=Math.random()*6.28;
    const hill=hillR(par.pos.distanceTo(sun.pos)/AU, par.mass);
    const moonDist=md.hf*hill;
    // Safety check: moon must be outside parent's physical radius
    if(moonDist <= par._visR+md.r+1) continue;
    const b=new Body({n:md.n,ty:'moon',m:md.m,r:md.r,c:md.c,t:-60,tx:md.tx,
      x:par.pos.x+moonDist*Math.cos(ang),z:par.pos.z+moonDist*Math.sin(ang)});
    b.vel.copy(par.vel).add(orbVel(b.pos,par.pos,par.mass));
    bodies.push(b);
  }

  // ── Saturn ring particles (InstancedMesh) ──
  const sat=pm['Saturno'];
  if(sat){
    const rs=new RingSystem(sat,200,SAT_RI,SAT_RO,0xb0a080);
    ringSystems.push(rs);
  }
  const ura=pm['Urano'];
  if(ura){
    const rs=new RingSystem(ura,80,URA_RI,URA_RO,0x88aabb);
    ringSystems.push(rs);
  }

  // Named asteroids
  for(const a of NAMED_AST){
    const ang=Math.random()*6.28,dist=a.au*AU;
    const b=new Body({n:a.n,ty:'asteroid',m:a.m,r:a.r,c:a.c,t:-100,tx:'asteroid',x:dist*Math.cos(ang),z:dist*Math.sin(ang)});
    b.vel.copy(orbVel(b.pos,sun.pos,sun.mass));bodies.push(b);
  }

  // Main belt 2.2–3.2 AU
  for(let i=0;i<40;i++){
    const dist=(2.2+Math.random()*1.0)*AU,ang=Math.random()*6.28;
    const b=new Body({n:'Ast',ty:'asteroid',m:2e-6+Math.random()*7e-5,r:.05*BOOST+Math.random()*.08*BOOST,c:0x776655+Math.floor(Math.random()*0x222111),tx:'asteroid',x:dist*Math.cos(ang),y:(Math.random()-.5)*AU*.015,z:dist*Math.sin(ang)});
    b.vel.copy(orbVel(b.pos,sun.pos,sun.mass));b.vel.x+=(Math.random()-.5)*.003;b.vel.z+=(Math.random()-.5)*.003;bodies.push(b);
  }

  // Kuiper belt
  for(let i=0;i<25;i++){
    const dist=(30+Math.random()*20)*AU,ang=Math.random()*6.28;
    const b=new Body({n:'KBO',ty:'asteroid',m:8e-5+Math.random()*7e-4,r:.08*BOOST+Math.random()*.2*BOOST,c:0x6677aa,tx:'asteroid',x:dist*Math.cos(ang),y:(Math.random()-.5)*AU*.04,z:dist*Math.sin(ang)});
    b.vel.copy(orbVel(b.pos,sun.pos,sun.mass));bodies.push(b);
  }

  refreshList();
}

// ══════════════════════════════════════════════════════════
//  PHYSICS
// ══════════════════════════════════════════════════════════
function physStep(dt){
  const n=bodies.length;
  for(let i=0;i<n;i++){bodies[i].acc.x=0;bodies[i].acc.y=0;bodies[i].acc.z=0;}
  for(let i=0;i<n;i++){
    const a=bodies[i];if(a.removed||a.isNebula)continue;
    const ax=a.pos.x,ay=a.pos.y,az=a.pos.z;
    for(let j=i+1;j<n;j++){
      const b=bodies[j];if(b.removed||b.isNebula)continue;
      const dx=b.pos.x-ax,dy=b.pos.y-ay,dz=b.pos.z-az;
      const r2=dx*dx+dy*dy+dz*dz+SOFT2;
      const inv=G/(r2*Math.sqrt(r2));
      const fx=inv*dx,fy=inv*dy,fz=inv*dz;
      a.acc.x+=fx*b.mass;a.acc.y+=fy*b.mass;a.acc.z+=fz*b.mass;
      b.acc.x-=fx*a.mass;b.acc.y-=fy*a.mass;b.acc.z-=fz*a.mass;
    }
  }
  for(let i=0;i<n;i++){
    const b=bodies[i];if(b.removed||b.isNebula)continue;
    b.vel.x+=b.acc.x*dt;b.vel.y+=b.acc.y*dt;b.vel.z+=b.acc.z*dt;
    b.pos.x+=b.vel.x*dt;b.pos.y+=b.vel.y*dt;b.pos.z+=b.vel.z*dt;
  }
}

function spawnEjecta(orig,cnt){
  const sun=bodies.find(b=>b.isStar);
  for(let k=0;k<cnt;k++){
    const dir=new THREE.Vector3().randomDirection(),sz=.3*BOOST+Math.random()*.4*BOOST;
    const nb=new Body({n:'Frag',ty:'asteroid',m:8e-7+Math.random()*8e-6,r:sz,c:0x887755,t:orig.temperature*.25,tx:'asteroid',
      x:orig.pos.x+dir.x*(orig._visR+sz+1),y:orig.pos.y+dir.y*2,z:orig.pos.z+dir.z*(orig._visR+sz+1)});
    nb.vel.copy(orig.vel).addScaledVector(dir,.8+Math.random()*1.8);
    if(sun)nb.vel.lerp(orbVel(nb.pos,sun.pos,sun.mass),.18);
    bodies.push(nb);
  }
}

function handleCollision(a,b){
  colCount++;document.getElementById('stC').textContent=colCount;
  const big=a.mass>=b.mass?a:b,sm=a.mass>=b.mass?b:a;
  const ip=big.pos.clone().lerp(sm.pos,.5);
  if(!sm.isAst&&!big.isAst){
    const tm=big.mass+sm.mass;
    big.vel.multiplyScalar(big.mass).addScaledVector(sm.vel,sm.mass).divideScalar(tm);
    big.pos.multiplyScalar(big.mass).addScaledVector(sm.pos,sm.mass).divideScalar(tm);
    big.mass=tm*.93;big.temperature+=2000+Math.random()*4000;
    big.radius=Math.cbrt(Math.pow(big.radius,3)+Math.pow(sm.radius,3))*.95;
    big.rebuildGeo();sm.removed=true;explode(ip,big._visR*1.5,0xff7700);spawnEjecta(big,5);
  } else if(sm.isAst&&!big.isAst){
    big.temperature+=15+Math.random()*50;sm.removed=true;explode(ip,big._visR*.6,0xffaa44);
  } else {explode(ip,(big._visR+sm._visR)*1.5,0xffcc66);big.mass+=sm.mass*.5;sm.removed=true;}
}

function checkCollisions(){
  const n=bodies.length;
  for(let i=0;i<n;i++){
    const a=bodies[i];if(a.removed||a._frame<20||a.isNebula)continue;
    for(let j=i+1;j<n;j++){
      const b=bodies[j];if(b.removed||b._frame<20||b.isNebula)continue;
      const dx=a.pos.x-b.pos.x,dy=a.pos.y-b.pos.y,dz=a.pos.z-b.pos.z;
      const sr=(a._visR+b._visR)*1.02;
      if(dx*dx+dy*dy+dz*dz<sr*sr) handleCollision(a,b);
    }
  }
  for(let i=bodies.length-1;i>=0;i--) if(bodies[i].removed){bodies[i].remove();bodies.splice(i,1);}
}

function refreshList(){
  if(!_listDirty)return;_listDirty=false;
  const el=document.getElementById('bl2');el.innerHTML='';
  bodies.filter(b=>!b.isAst&&!b.removed).forEach(b=>{
    const row=document.createElement('div');
    row.className='br'+(selBody&&selBody.id===b.id?' sl':'');
    const tc=b.temperature>500?'#f84':b.temperature<-100?'#88f':'#8b8';
    const ms=b.mass>=1?b.mass.toFixed(0):b.mass.toExponential(2);
    row.innerHTML=`<div class="bd" style="background:#${b.color.toString(16).padStart(6,'0')}"></div>
      <div class="bi"><div class="bn">${b.name}</div><div class="bs" style="color:${tc}">${ms}×10²⁴ · ${Math.round(b.temperature)}°C</div></div>`;
    row.onclick=()=>openSel(b);el.appendChild(row);
  });
  const an=bodies.filter(b=>b.isAst&&!b.removed).length;
  document.getElementById('aC').textContent=`+${an} ast/KBO`;
  document.getElementById('stB').textContent=bodies.filter(b=>!b.removed).length;
}

function openSel(b){
  selBody=b;_listDirty=true;
  document.getElementById('sp').style.display='block';
  document.getElementById('sN').textContent=b.name.toUpperCase();
  document.getElementById('si-ty').textContent=b.type;
  document.getElementById('si-ms').textContent=(b.mass>=1?b.mass.toFixed(2):b.mass.toExponential(3))+' ×10²⁴';
  document.getElementById('si-tp').textContent=Math.round(b.temperature)+'°C';
  document.getElementById('si-vl').textContent=b.vel.length().toFixed(4)+' u/s';
  const sun=bodies.find(x=>x.isStar&&x.name==='Sol')||bodies.find(x=>x.isStar);
  document.getElementById('si-ds').textContent=sun?(b.pos.distanceTo(sun.pos)/AU).toFixed(3)+' AU':'--';
  document.getElementById('eM').value=b.mass;
  document.getElementById('eS').value=b.radius.toFixed(2);
  document.getElementById('eT').value=Math.round(b.temperature);

  document.getElementById('vy').value=b.vel.y.toFixed(4);
  document.getElementById('vz').value=b.vel.z.toFixed(4);

  orbit.target.copy(selBody.pos);

const _groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);

document.addEventListener('mousemove',e=>{

  if(spawnMode){dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';}

ren.domElement.addEventListener('click',e=>{
  if(freeFly||e.target!==ren.domElement)return;
  _spawnV.x=(e.clientX/innerWidth)*2-1;_spawnV.y=-(e.clientY/innerHeight)*2+1;
  _spawnRay.setFromCamera(_spawnV,cam);

  if(spawnMode&&_pendingSpawn){
    _spawnRay.ray.intersectPlane(_groundPlane,_hitPt);
    const cfg=_pendingSpawn;
    const txM={rocky:'rocky',gas:'gas',ice:'ice',sun:'sun',giant:'giant',whitedwarf:'whitedwarf',browndwarf:'browndwarf',neutron:'neutron',moon:'moon',asteroid:'asteroid',blackhole:'blackhole',comet:'comet',nebula:'rocky'};
    const b=new Body({n:cfg.n,ty:cfg.ty,m:cfg.m,r:cfg.r,c:cfg.c,t:cfg.t,tx:txM[cfg.ty]||'rocky',x:_hitPt.x,y:_hitPt.y,z:_hitPt.z});
    if(cfg.autoOrbit){
      const sun=bodies.find(x=>x.isStar)||bodies.reduce((a,c)=>c.mass>a.mass?c:a,bodies[0]);
      if(sun) b.vel.copy(orbVel(b.pos,sun.pos,sun.mass));
    }
    bodies.push(b);_listDirty=true;refreshList();
    // Hold spawn mode for more placements
    return;
  }

  // Normal select
  const hits=_spawnRay.intersectObjects(bodies.filter(b=>!b.removed).map(b=>b.mesh));
  if(hits.length){const b=hits[0].object.userData.body;if(b)openSel(b);}
});

const clock=new THREE.Clock();
const SUBS=3;
let fpsT=0,uiT=0,gridT=0,tempT=0,frameN=0;

buildSolarSystem();

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05);
  frameN++;
  fpsT+=dt;if(fpsT>.6){document.getElementById('stF').textContent=Math.round(1/Math.max(dt,.001));fpsT=0;}

  if(!paused){
    const step=dt*tMult*15/SUBS;
    for(let s=0;s<SUBS;s++) physStep(step);
    checkCollisions();
    simTime+=dt*tMult;

    const sun=bodies.find(b=>b.isStar&&b.name==='Sol')||bodies.find(b=>b.isStar);

    // Temperature every 8 frames
    tempT+=dt;if(tempT>.12){bodies.forEach(b=>{if(!b.removed&&!b.isAst)b.updTemp(sun,tempT);});tempT=0;}

    // Update ring systems
    const physStep2=dt*tMult;
    for(const rs of ringSystems){
      if(!rs.parent.removed) rs._update(physStep2*15);
    }

    bodies.forEach(b=>{if(!b.removed){b.sync();b.updTrail();if(!b.isAst&&!b.isNebula)b.updAppearance();}});

    // Cleanup escaped
    for(let i=bodies.length-1;i>=0;i--) if(bodies[i].pos.length()>800000){bodies[i].remove();bodies.splice(i,1);}
    for(let i=_exps.length-1;i>=0;i--) if(_exps[i](dt))_exps.splice(i,1);

    if(sun){sunPt.position.copy(sun.pos);const f=Math.sqrt(Math.max(.001,sun.mass/M_SUN));sunPt.intensity=f*6500;sunPt.distance=sun._visR*500;}
  }

  // Grid
  if(showGr){gridT+=dt;if(gridT>.12){deformGrid(bodies);gridT=0;}}

  // Labels
  if(showLb)bodies.forEach(b=>{if(!b.removed)b.updLabel();});

  // Follow target (camera focus)
  if(_followTarget&&!_followTarget.removed&&!freeFly){
    const delta=new THREE.Vector3().subVectors(_followTarget.pos,orbit.target);
    orbit.target.copy(_followTarget.pos);
    cam.position.add(delta);
    orbit.update();
  }

  // UI every 0.4s
  uiT+=dt;if(uiT>.4){
    uiT=0;_listDirty=true;refreshList();
    if(selBody&&!selBody.removed){
      document.getElementById('si-vl').textContent=selBody.vel.length().toFixed(4)+' u/s';
      document.getElementById('si-tp').textContent=Math.round(selBody.temperature)+'°C';
      const s2=bodies.find(b=>b.isStar&&b.name==='Sol')||bodies.find(b=>b.isStar);
      if(s2)document.getElementById('si-ds').textContent=(selBody.pos.distanceTo(s2.pos)/AU).toFixed(3)+' AU';
    } else if(selBody&&selBody.removed)closeSel();
    const d=simTime*tMult;document.getElementById('stT').textContent=d<365?d.toFixed(1)+' d':(d/365).toFixed(2)+' a';
  }

  if(freeFly){const sp=dt*(window._sh?6000:1200);if(mv.f)cam.translateZ(-sp);if(mv.b)cam.translateZ(sp);if(mv.l)cam.translateX(-sp);if(mv.r)cam.translateX(sp);if(mv.u)cam.translateY(sp);if(mv.d)cam.translateY(-sp);}
  orbit.update();
  ren.render(scene,cam);
}

window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight);});
animate();
</script>
